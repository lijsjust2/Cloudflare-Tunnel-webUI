name: Build Docker Image

on:
  workflow_dispatch:
    inputs:
      build_version:
        description: '构建版本号（latest 除外请输入具体版本号）'
        required: false
        default: 'latest'
        type: string
      create_release:
        description: '创建 GitHub Release（仅用于正式发布版本）'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host

      - name: Build Docker image (AMD64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/amd64
          tags: cloudflare-tunnel-webui:amd64-${{ github.event.inputs.build_version }}
          no-cache: true
          outputs: type=docker,dest=/tmp/cloudflare-tunnel-webui-amd64.tar

      - name: Build Docker image (ARM64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          platforms: linux/arm64
          tags: cloudflare-tunnel-webui:arm64-${{ github.event.inputs.build_version }}
          no-cache: true
          outputs: type=docker,dest=/tmp/cloudflare-tunnel-webui-arm64.tar

      - name: Verify built images
        run: |
          echo "=== Verifying AMD64 image ==="
          ls -lh /tmp/cloudflare-tunnel-webui-amd64.tar
          file /tmp/cloudflare-tunnel-webui-amd64.tar
          
          echo -e "\n=== Verifying ARM64 image ==="
          ls -lh /tmp/cloudflare-tunnel-webui-arm64.tar
          file /tmp/cloudflare-tunnel-webui-arm64.tar
          
          echo -e "\n=== Checking tar file contents ==="
          tar -tvf /tmp/cloudflare-tunnel-webui-amd64.tar | head -5
          tar -tvf /tmp/cloudflare-tunnel-webui-arm64.tar | head -5

      - name: Get version and timestamp
        id: version
        run: |
          VERSION="${{ github.event.inputs.build_version }}"
          if [ -z "$VERSION" ]; then
            VERSION="latest"
          fi
          
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Rename files with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          
          mv /tmp/cloudflare-tunnel-webui-amd64.tar "/tmp/cloudflare-tunnel-webui-amd64-${VERSION}.tar"
          mv /tmp/cloudflare-tunnel-webui-arm64.tar "/tmp/cloudflare-tunnel-webui-arm64-${VERSION}.tar"
          
          echo "Renamed files:"
          ls -lh /tmp/cloudflare-tunnel-webui-*.tar

      - name: Create Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Docker Image ${{ steps.version.outputs.version }}"
          body: |
            Docker 镜像构建版本: ${{ steps.version.outputs.version }}
            
            支持架构:
            - AMD64 (x86_64)
            - ARM64 (aarch64)
            
            使用方法:
            ```bash
            # 加载镜像
            docker load -i cloudflare-tunnel-webui-amd64-${{ steps.version.outputs.version }}.tar
            # 或
            docker load -i cloudflare-tunnel-webui-arm64-${{ steps.version.outputs.version }}.tar
            
            # 运行容器
            docker run -d \
              --name cloudflare-tunnel-webui \
              --network host \
              -v ./data:/app/data \
              -e WEB_PORT=7388 \
              -e TZ=Asia/Shanghai \
              --restart unless-stopped \
              cloudflare-tunnel-webui:amd64-${{ steps.version.outputs.version }}
            ```
          draft: false
          prerelease: false
          files: |
            /tmp/cloudflare-tunnel-webui-amd64-${{ steps.version.outputs.version }}.tar
            /tmp/cloudflare-tunnel-webui-arm64-${{ steps.version.outputs.version }}.tar

      - name: Upload artifacts
        if: github.event.inputs.create_release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: docker-images-${{ steps.version.outputs.version }}
          path: |
            /tmp/cloudflare-tunnel-webui-amd64-${{ steps.version.outputs.version }}.tar
            /tmp/cloudflare-tunnel-webui-arm64-${{ steps.version.outputs.version }}.tar
          retention-days: 7
